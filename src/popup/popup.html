<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>WorkdayAgent</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
    }
    .status {
      font-size: 13px;
      color: #555;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 4px;
    }
    .version {
      font-size: 11px;
      color: #999;
      margin-top: 12px;
    }
    button {
      margin-top: 12px;
      width: 100%;
      padding: 8px 12px;
      font-size: 13px;
      border: 1px solid #d0d0d0;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover:not(:disabled) {
      background: #f5f5f5;
    }
    button:disabled {
      color: #aaa;
      cursor: not-allowed;
    }
    .hint {
      font-size: 11px;
      color: #888;
      margin-top: 6px;
    }
    textarea {
      display: block;
      width: 100%;
      margin-top: 8px;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 11px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      padding: 6px;
      box-sizing: border-box;
      resize: vertical;
    }
  </style>
</head>
<body>
  <h1>WorkdayAgent</h1>
  <div class="status" id="status">Initializing...</div>
  <button id="scanBtn" disabled>Scan</button>
  <button id="captureBtn" disabled>Save as Profile</button>
  <button id="fillBtn" disabled>Fill from Profile</button>
  <div class="hint">Scan: shows the field JSON. Save: captures the page into your profile. Fill: writes your saved profile back into the page.</div>
  <textarea id="output" rows="8" readonly placeholder="Output will appear here."></textarea>
  <div class="version">v0.0.1</div>
  <script type="module" src="/src/popup/popup.ts"></script>
</body>
</html>
