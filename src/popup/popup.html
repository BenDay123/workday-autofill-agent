<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>WorkdayAgent</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
    }
    .status {
      font-size: 13px;
      color: #555;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 4px;
    }
    .version {
      font-size: 11px;
      color: #999;
      margin-top: 12px;
    }
    button {
      margin-top: 10px;
      width: 100%;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #1f2937;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
    }
    button:hover:not(:disabled) {
      background: #f9fafb;
      border-color: #9ca3af;
    }
    button:focus-visible:not(:disabled) {
      outline: none;
      box-shadow: 0 0 0 3px rgba(31, 41, 55, 0.2);
    }
    button:active:not(:disabled) {
      transform: translateY(1px);
    }
    button:disabled {
      color: #9ca3af;
      background: #f9fafb;
      border-color: #e5e7eb;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #1f2937;
      color: #fff;
      border-color: #1f2937;
    }
    .btn-primary:hover:not(:disabled) {
      background: #111827;
      border-color: #111827;
    }
    .btn-primary:focus-visible:not(:disabled) {
      box-shadow: 0 0 0 3px rgba(31, 41, 55, 0.35);
    }
    .btn-primary:disabled {
      background: #9ca3af;
      color: #f3f4f6;
      border-color: #9ca3af;
    }
    .btn-primary.loading {
      color: transparent;
      pointer-events: none;
      position: relative;
    }
    .btn-primary.loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 14px;
      height: 14px;
      margin: -7px 0 0 -7px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: wa-spin 0.7s linear infinite;
    }
    @keyframes wa-spin {
      to { transform: rotate(360deg); }
    }
    .hint {
      font-size: 11px;
      color: #888;
      margin-top: 6px;
    }
    .debug-only {
      display: none;
    }
    body.debug-on .debug-only {
      display: block;
    }
    .debug-toggle {
      margin-top: 12px;
      font-size: 11px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .debug-toggle input {
      margin: 0;
    }
    textarea {
      display: block;
      width: 100%;
      margin-top: 8px;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 11px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      padding: 6px;
      box-sizing: border-box;
      resize: vertical;
    }
  </style>
</head>
<body>
  <h1>WorkdayAgent</h1>
  <div class="status" id="status">Initializing...</div>
  <button id="scanBtn" class="debug-only" disabled>Scan</button>
  <button id="captureBtn" disabled>Save as Profile</button>
  <button id="fillBtn" class="btn-primary" disabled>Fill from Profile</button>
  <div class="hint">Save: captures the page into your profile. Fill: writes your saved profile back into the page.</div>
  <div class="hint debug-only">Scan: shows the field JSON for diagnostics.</div>
  <textarea id="output" rows="8" readonly placeholder="Output will appear here."></textarea>
  <div class="version">v0.0.24</div>
  <label class="debug-toggle">
    <input type="checkbox" id="debugToggle" />
    Debug mode
  </label>
  <script type="module" src="/src/popup/popup.ts"></script>
</body>
</html>
